name: pint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  pint:
    runs-on: ubuntu-latest

    name: Code style

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run Pint
        run: vendor/bin/pint --test
